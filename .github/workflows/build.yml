name: build

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Build channel"
        required: false
        type: choice
        options:
          - dev
          - prod
        default: dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            platform_flag: --mac --arm64
            arch_label: arm64
          # Uncomment after signing is verified:
          # - host: macos-latest
          #   platform_flag: --mac --x64
          #   arch_label: x64
          # - host: ubuntu-latest
          #   platform_flag: --linux
          #   arch_label: x64
          # - host: windows-latest
          #   platform_flag: --win
          #   arch_label: x64

    runs-on: ${{ matrix.host }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Import code signing certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: build
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: bun run build
        working-directory: packages/desktop-electron
        env:
          OPENCODE_CHANNEL: ${{ inputs.channel || 'dev' }}

      - name: Setup Apple API Key
        if: runner.os == 'macOS'
        run: printenv APPLE_API_KEY_CONTENT > $RUNNER_TEMP/apple-api-key.p8
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}

      - name: Package and sign
        run: npx electron-builder ${{ matrix.platform_flag }} --publish never --config electron-builder.config.ts
        working-directory: packages/desktop-electron
        timeout-minutes: 60
        env:
          OPENCODE_CHANNEL: ${{ inputs.channel || 'dev' }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - uses: actions/upload-artifact@v4
        with:
          name: pawwork-${{ runner.os }}-${{ matrix.arch_label }}
          path: |
            packages/desktop-electron/dist/*.dmg
            packages/desktop-electron/dist/*.zip
            packages/desktop-electron/dist/*.exe
            packages/desktop-electron/dist/*.AppImage
            packages/desktop-electron/dist/*.deb
